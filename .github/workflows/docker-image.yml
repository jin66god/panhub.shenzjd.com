name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml"
      - "package.json"
      - "package-lock.json"
      - "nuxt.config.*"
      - "app/**"
      - "assets/**"
      - "components/**"
      - "composables/**"
      - "layouts/**"
      - "pages/**"
      - "plugins/**"
      - "public/**"
      - "server/**"
      - "shared/**"
      - "types/**"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build multi-arch image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        run: |
          image="${REGISTRY}/$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${image}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,prefix=
            type=sha,format=short,prefix=sha-
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=PanHub Nuxt server image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect pushed image manifest
        run: |
          docker buildx imagetools inspect "${IMAGE}:latest"
          docker buildx imagetools inspect "${IMAGE}@${{ steps.build.outputs.digest }}"

  deploy:
    name: Deploy to server
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check deploy secrets
        id: deploy_config
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Deploy secrets are not fully configured; skipping SSH deploy."
          fi

      - name: Deploy to server
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            set -e
            IMAGE="${{ needs.build-and-push.outputs.image }}:latest"
            CONTAINER="${{ github.event.repository.name }}"
            DATA_DIR="/opt/1panel/apps/openresty/openresty/www/sites/panhub.shenzjd.com/index"

            echo "=== 登录 GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            echo "=== 拉取最新镜像 ==="
            sudo docker pull "$IMAGE"

            echo "=== 停止旧容器 ==="
            sudo docker stop "$CONTAINER" || true
            sudo docker rm "$CONTAINER" || true

            echo "=== 准备数据目录 ==="
            sudo mkdir -p "$DATA_DIR"
            sudo chmod 777 "$DATA_DIR"

            echo "=== 启动新容器 ==="
            sudo docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p 5253:4000 \
              -v "$DATA_DIR:/app/data" \
              "$IMAGE"

            echo "=== 等待健康检查 ==="
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:5253/api/health >/dev/null; then
                echo "Health check passed"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Health check failed"
                sudo docker logs "$CONTAINER" --tail 100 || true
                exit 1
              fi
              sleep 2
            done

            echo "=== 清理旧镜像 ==="
            sudo docker image prune -f

            echo "=== 部署完成 ==="
            sudo docker ps --filter "name=$CONTAINER"
