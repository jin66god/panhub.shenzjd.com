name: Sync upstream (merge from fixed upstream)

on:
  schedule:
    - cron: "0 3 * * *" # 每天 03:00 UTC 运行
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # 固定上游仓库与分支（按需改动）
      UPSTREAM_REPO: wu529778790/panhub.shenzjd.com
      UPSTREAM_BRANCH: main
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/${UPSTREAM_REPO}.git || git remote set-url upstream https://github.com/${UPSTREAM_REPO}.git
          git fetch upstream --tags --prune

      - name: Determine branches
        id: b
        run: |
          local_default="${DEFAULT_BRANCH:-main}"
          # 兜底：若无 origin/HEAD，尝试识别 main/master
          if ! git rev-parse --verify "origin/$local_default" >/dev/null 2>&1; then
            if git rev-parse --verify origin/main >/dev/null 2>&1; then local_default=main; else local_default=master; fi
          fi
          echo "local_default=$local_default" >> $GITHUB_OUTPUT
          echo "upstream_default=${UPSTREAM_BRANCH}" >> $GITHUB_OUTPUT

      - name: Merge upstream -> fork and keep local Docker workflow
        run: |
          set -e
          git checkout "${{ steps.b.outputs.local_default }}"

          protected_files=(
            ".github/workflows/docker-image.yml"
          )

          tmpdir="$(mktemp -d)"
          for file in "${protected_files[@]}"; do
            if [ -f "$file" ]; then
              mkdir -p "$tmpdir/$(dirname "$file")"
              cp "$file" "$tmpdir/$file"
            fi
          done

          # 合并上游最新提交，但明确保留本 fork 自己维护的 Docker 镜像 workflow。
          # 即使上游之后修改同名文件，也不会覆盖本仓库的多架构 GHCR 构建配置。
          set +e
          git merge --no-ff --no-commit "upstream/${{ steps.b.outputs.upstream_default }}"
          merge_status=$?
          set -e

          for file in "${protected_files[@]}"; do
            if [ -f "$tmpdir/$file" ]; then
              cp "$tmpdir/$file" "$file"
              git add "$file"
            fi
          done

          unresolved="$(git diff --name-only --diff-filter=U)"
          if [ -n "$unresolved" ]; then
            echo "Upstream sync has unresolved conflicts outside protected files:"
            echo "$unresolved"
            exit 1
          fi

          if ! git diff --cached --quiet; then
            git commit -m "chore: sync upstream and keep local docker workflow"
            git push origin "${{ steps.b.outputs.local_default }}"
          elif [ "$merge_status" -eq 0 ]; then
            echo "Already up to date; nothing to push."
          else
            echo "Merge did not create staged changes and returned status $merge_status."
            exit "$merge_status"
          fi

      - name: Sync tags
        run: git push --tags origin
